services:
  postgres:
    image: postgres:16-alpine
    container_name: msr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-msr_command_center}
      POSTGRES_USER: ${POSTGRES_USER:-msr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msr} -d ${POSTGRES_DB:-msr_command_center}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: msr-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-msr_command_center};Username=${POSTGRES_USER:-msr};Password=${POSTGRES_PASSWORD:-change-me}
      Jwt__Issuer: ${Jwt__Issuer:-msr-command-center}
      Jwt__Audience: ${Jwt__Audience:-msr-command-center-web}
      Jwt__SigningKey: ${Jwt__SigningKey:-replace-with-a-long-random-secret-key-at-least-32-chars}
      Cors__AllowedOrigins: ${Cors__AllowedOrigins:-http://localhost:3000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    container_name: msr-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres-data:

